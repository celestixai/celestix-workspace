services:
  - type: web
    name: celestix-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: RATE_LIMIT_MAX
        value: "10000"
      - key: AUTH_RATE_LIMIT_MAX
        value: "500"
      - key: UPLOAD_RATE_LIMIT_MAX
        value: "50"
      - key: LOG_LEVEL
        value: info
      - key: STORAGE_PATH
        value: ./storage
      - key: DATABASE_URL
        fromDatabase:
          name: celestix-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: celestix-redis
          type: redis
          property: connectionString

databases:
  - name: celestix-db
    plan: free
    databaseName: celestix
    user: celestix

  - name: celestix-redis
    plan: free
    type: redis
