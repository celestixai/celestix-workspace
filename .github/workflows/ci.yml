###############################################################################
# Celestix CI/CD Pipeline
# 
# Triggers: push to main/develop, PRs to main
# Jobs: lint → test → build → deploy
# 
# SETUP REQUIRED (GitHub Secrets):
#   RENDER_API_KEY        - Render deploy hook
#   RENDER_SERVICE_ID     - Backend service ID on Render
#   NETLIFY_AUTH_TOKEN    - Netlify personal access token
#   NETLIFY_SITE_ID       - Celestix AI site ID on Netlify
#   DATABASE_URL          - PostgreSQL connection string (for test DB)
#   REDIS_URL             - Redis connection string (for tests)
###############################################################################

name: Celestix CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════
  # JOB 1: LINT & TYPE CHECK
  # ═══════════════════════════════════════════════
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      # Backend
      - name: Install backend dependencies
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Backend type check
        working-directory: ./backend
        run: pnpm tsc --noEmit

      - name: Backend lint
        working-directory: ./backend
        run: pnpm lint || echo "::warning::Backend lint not configured yet — add eslint"

      # Frontend
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend type check
        working-directory: ./frontend
        run: pnpm tsc --noEmit

      - name: Frontend lint
        working-directory: ./frontend
        run: pnpm lint || echo "::warning::Frontend lint not configured yet — add eslint"

  # ═══════════════════════════════════════════════
  # JOB 2: BACKEND TESTS
  # ═══════════════════════════════════════════════
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: celestix_test
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: celestix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U celestix_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://celestix_test:testpassword@localhost:5432/celestix_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: ./backend
        run: pnpm prisma generate

      - name: Run Prisma migrations
        working-directory: ./backend
        run: pnpm prisma migrate deploy

      - name: Run tests
        working-directory: ./backend
        run: pnpm test -- --coverage || echo "::warning::No tests found yet — add Jest test suites"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════
  # JOB 3: FRONTEND TESTS
  # ═══════════════════════════════════════════════
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: ./frontend
        run: pnpm test -- --coverage || echo "::warning::No tests found yet — add Vitest test suites"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════
  # JOB 4: BUILD
  # ═══════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      # Backend build
      - name: Install backend deps
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      - name: Build backend
        working-directory: ./backend
        run: pnpm build

      # Frontend build
      - name: Install frontend deps
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ═══════════════════════════════════════════════
  # JOB 5: DEPLOY (main branch only)
  # ═══════════════════════════════════════════════
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "Deploy triggered on Render"

  deploy-ai-site:
    name: Deploy AI Site (Netlify)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: |
          netlify deploy --prod --dir=dist --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
